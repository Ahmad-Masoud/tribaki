services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: tribaki-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend Service
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: tribaki-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - COUNTRIES_API_BASE_URL=https://restcountries.com/v3.1
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./Backend:/app
      - /app/node_modules

  # Frontend Service
  frontend:
    build:
      context: ./Tribaki
      dockerfile: Dockerfile
    container_name: tribaki-frontend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - REACT_APP_API_URL=http://localhost:5001
    depends_on:
      - backend
    volumes:
      - ./Tribaki:/app
      - /app/node_modules
    stdin_open: true
    tty: true

volumes:
  mysql_data:
